version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./jobs:/app/jobs
      - ./logs:/app/logs
      - ./db:/app/db
      - ./config.json:/app/config.json
    environment:
      - DATABASE_URL=sqlite:///./local_llm_platform.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
    depends_on:
      - redis
    restart: unless-stopped

  runtime-manager:
    build: .
    command: python -m local_llm_platform.apps.runtime_manager.main
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models
    depends_on:
      - gateway
    restart: unless-stopped

  trainer-worker:
    build: .
    command: python -m local_llm_platform.apps.trainer_worker.main
    ports:
      - "8002:8002"
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
